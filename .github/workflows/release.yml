# Prebuilt binaries on every release tag. keel is a single self-contained
# binary (htmx/css/templates are compiled in), so each artifact is just the
# executable, tarred, with a sha256 alongside.
#
# Triggers: pushing a v* tag, or manual dispatch with an EXISTING tag to
# backfill assets (the build checks out the tag's code either way; symbols are
# stripped at link time via CARGO_PROFILE_RELEASE_STRIP so local builds keep
# theirs). If the release doesn't exist yet it is created with generated
# notes; hand-written notes (like v1.0's) are left untouched.
name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach binaries to (e.g. v1.0)'
        required: true

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # v2.4 — native arm64 linux (public repos get free arm runners; no
          # cross toolchain needed).
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      # Preinstalled stable toolchain: runner images ship rustup + stable, and
      # every matrix target is its runner's HOST triple, so nothing needs
      # downloading. (The sh.rustup.rs bootstrap this replaces 503-flaked
      # three release runs into the ground on 2026-07-16.)
      - run: rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: cargo build --release -p keel-engine --target ${{ matrix.target }}
      - name: Package
        id: pkg
        run: |
          NAME="keel-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "${NAME}.tar.gz" keel
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          # Create-first, tolerate "already exists". The old chain led with
          # `gh release view`, but the by-tag view endpoint has served
          # 404/503 while the release EXISTED (2026-07-16), failing the whole
          # step. Create's failure modes we can classify: raced-and-lost is
          # fine, anything else is real.
          if ! gh release create "$TAG" --verify-tag --generate-notes 2>create-err.txt; then
            grep -qi "already exists" create-err.txt || { cat create-err.txt; exit 1; }
          fi
          # Uploads ride the same flaky endpoint — retry with backoff, fail
          # loudly only when five attempts all lose.
          ok=""
          for i in 1 2 3 4 5; do
            if gh release upload "$TAG" \
              "${{ steps.pkg.outputs.name }}.tar.gz" \
              "${{ steps.pkg.outputs.name }}.tar.gz.sha256" \
              --clobber; then ok=1; break; fi
            echo "upload attempt $i failed; retrying in 30s"
            sleep 30
          done
          [ -n "$ok" ]
