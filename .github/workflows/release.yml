# Prebuilt binaries on every release tag. keel is a single self-contained
# binary (htmx/css/templates are compiled in), so each artifact is just the
# executable, tarred, with a sha256 alongside.
#
# Triggers: pushing a v* tag, or manual dispatch with an EXISTING tag to
# backfill assets (the build checks out the tag's code either way; symbols are
# stripped at link time via CARGO_PROFILE_RELEASE_STRIP so local builds keep
# theirs). If the release doesn't exist yet it is created with generated
# notes; hand-written notes (like v1.0's) are left untouched.
name: release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and attach binaries to (e.g. v1.0)'
        required: true

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          # v2.4 — native arm64 linux (public repos get free arm runners; no
          # cross toolchain needed).
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
      # Preinstalled stable toolchain: runner images ship rustup + stable, and
      # every matrix target is its runner's HOST triple, so nothing needs
      # downloading. (The sh.rustup.rs bootstrap this replaces 503-flaked
      # three release runs into the ground on 2026-07-16.)
      - run: rustup default stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        env:
          CARGO_PROFILE_RELEASE_STRIP: symbols
        run: cargo build --release -p keel-engine --target ${{ matrix.target }}
      - name: Package
        id: pkg
        run: |
          NAME="keel-${{ steps.tag.outputs.tag }}-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "${NAME}.tar.gz" keel
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG='${{ steps.tag.outputs.tag }}'
          REPO='${{ github.repository }}'
          # Create-first, tolerate "already exists" (a matrix sibling may have
          # won the race, or the release may predate this run). Everything
          # below deliberately avoids the /releases/tags/<tag> endpoint: it
          # 503'd through ENTIRE runs on 2026-07-16 — including inside
          # `gh release view` and `gh release upload` — while the list and
          # by-id endpoints stayed healthy. Resolve the id from the LIST,
          # upload by id via uploads.github.com.
          if ! gh release create "$TAG" --verify-tag --generate-notes 2>create-err.txt; then
            grep -qi "already exists" create-err.txt || { cat create-err.txt; exit 1; }
          fi
          RELID=""
          for i in 1 2 3 4 5; do
            RELID=$(gh api "repos/$REPO/releases?per_page=100" \
              --jq ".[] | select(.tag_name==\"$TAG\") | .id" 2>/dev/null | head -1) || true
            [ -n "$RELID" ] && break
            echo "release id lookup attempt $i failed; retrying in 20s"; sleep 20
          done
          [ -n "$RELID" ]
          for f in "${{ steps.pkg.outputs.name }}.tar.gz" "${{ steps.pkg.outputs.name }}.tar.gz.sha256"; do
            ok=""
            for i in 1 2 3 4 5; do
              # clobber semantics: drop a same-named asset before uploading
              AID=$(gh api "repos/$REPO/releases/$RELID/assets?per_page=100" \
                --jq ".[] | select(.name==\"$f\") | .id" 2>/dev/null | head -1) || true
              if [ -n "$AID" ]; then
                gh api -X DELETE "repos/$REPO/releases/$RELID/assets/$AID" >/dev/null 2>&1 || true
              fi
              if gh api --method POST -H "Content-Type: application/octet-stream" \
                  "https://uploads.github.com/repos/$REPO/releases/$RELID/assets?name=$f" \
                  --input "$f" >/dev/null; then
                ok=1; break
              fi
              echo "upload of $f attempt $i failed; retrying in 30s"; sleep 30
            done
            [ -n "$ok" ]
          done
